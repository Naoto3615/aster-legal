<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aster Legal | Plans</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="extra-page">
    <div class="bg-layer"></div>
    <header class="site-header container">
      <a class="brand" href="index.html">Aster Legal</a>
      <button class="menu-toggle" aria-expanded="false" aria-label="メニュー">☰</button>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="plans.html">Plans</a>
        <a href="faq.html">FAQ</a>
      </nav>
    </header>

    <main class="container">
      <section class="subhero reveal">
        <span class="eyebrow">PLANS</span>
        <h1>法務体制に合わせた顧問プラン</h1>
        <p>相談頻度や案件規模に応じて、最適な顧問形態を選択できます。</p>
      </section>

      <section class="section reveal" data-pricing>
        <div class="pricing-head">
          <h2>プラン一覧</h2>
          <div class="pricing-mode">
            <button class="mode-btn active" type="button" data-mode="monthly">Monthly</button>
            <button class="mode-btn" type="button" data-mode="yearly">Yearly</button>
          </div>
        </div>

        <div class="pricing-cards">
          <article class="price-card">
            <h3>Basic Counsel</h3>
            <p>月次相談と契約書レビューの基本プラン。</p>
            <strong>¥<span data-price data-monthly="50000" data-yearly="550000">50000</span></strong>
          </article>
          <article class="price-card">
            <h3>Growth Counsel</h3>
            <p>資金調達・労務対応まで含む拡張支援。</p>
            <strong>¥<span data-price data-monthly="120000" data-yearly="1320000">120000</span></strong>
          </article>
          <article class="price-card">
            <h3>Executive Counsel</h3>
            <p>経営会議同席を含む上位顧問プラン。</p>
            <strong>¥<span data-price data-monthly="220000" data-yearly="2420000">220000</span></strong>
          </article>
        </div>
      </section>

      <section class="section reveal">
        <div class="section-head">
          <span class="eyebrow">ESTIMATE</span>
          <h2>簡易見積もり</h2>
        </div>
        <div class="calc-box">
          <form class="calc-form">
            <label>
              プラン単価(円)
              <select name="unit_price">
                <option value="50000">Basic Counsel</option>
                <option value="120000">Growth Counsel</option>
                <option value="220000">Executive Counsel</option>
              </select>
            </label>
            <label>
              数量
              <input type="number" name="quantity" min="1" value="1" />
            </label>
            <label>
              期間(月)
              <input type="number" name="months" min="1" value="3" />
            </label>
            <button type="submit" class="btn primary">見積もる</button>
          </form>
          <p class="calc-result" aria-live="polite">見積もり結果: -</p>
        </div>
      </section>
    </main>

    <footer class="container">© <span id="year"></span> Aster Legal</footer>
    <div class="toast" id="toast">更新内容を反映しました。</div>
    <script src="app.js"></script>
  </body>
</html>
